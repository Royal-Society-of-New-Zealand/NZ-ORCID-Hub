version: '3.5'

services:

  db:
    image: postgres:15.2
    profiles: ["standalone"]
    environment:
      - PGPASSWORD
      - POSTGRES_PASSWORD="${PGPASSWORD:-p455w0rd}"
    domainname: ${DOMAINNAME:-orcidhub.org.nz}
    hostname: db
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - /var/run/postgresql:/var/run/postgresql
      - ./conf/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - pgdata:/var/lib/postgresql/data
      - ./backup:/backup
      - ./archive:/archive
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    profiles: ["standalone"]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      default:
        ipv4_address: ${SUBNET:-172.33}.0.88

  app:
    image: orcidhub/app-dev:latest
    environment:
      - ENV
      - EXTERNAL_SP
      - DATABASE_URL
      - LOAD_TEST
      - MAIL_DEFAULT_SENDER
      - MAIL_SUPPORT_ADDRESS
      - MEMBER_API_FORM_MAIL
      - ORCID_CLIENT_ID
      - ORCID_CLIENT_SECRET
      - RQ_REDIS_URL
      - SECRET_KEY
      - SENTRY_DSN
      - SENTRY_TRACES_SAMPLE_RATE
      - SP_ATTR_AFFILIATION
      - SP_ATTR_DISPLAYNAME
      - SP_ATTR_EPPN
      - SP_ATTR_GIVENNAME
      - SP_ATTR_MAIL
      - SP_ATTR_ORCID
      - SP_ATTR_ORG
      - SP_ATTR_SN
    domainname: ${DOMAINNAME:-orcidhub.org.nz}
    hostname: app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/postgresql:/var/run/postgresql
      - .:/src
      - .:/var/www/orcidhub/
      - ./run-app:/usr/local/bin/run-app
      - ./app.conf:/etc/httpd/conf.d/ZZ-app.conf
      - ./tuakiri-test-metadata-cert.pem:/etc/shibboleth/tuakiri-test-metadata-cert.pem
      - ./tuakiri-metadata-cert.pem:/etc/shibboleth/tuakiri-metadata-cert.pem
      - ./.keys:/.keys
      - ./conf:/conf
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "80"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      default:
        ipv4_address: ${SUBNET:-172.33}.0.99

  worker:
    image: orcidhub/app-dev:latest
    command: ["bash", "-c", "sed -i 's/\\r//' ./worker.sh && exec ./worker.sh"]
    working_dir: /src
    environment:
      - ENV
      - DATABASE_URL
      - MAIL_DEFAULT_SENDER
      - MAIL_SUPPORT_ADDRESS
      - MEMBER_API_FORM_MAIL
      - ORCID_CLIENT_ID
      - ORCID_CLIENT_SECRET
      - RQ_REDIS_URL=${RQ_REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY
      - SENTRY_DSN
      - SENTRY_TRACES_SAMPLE_RATE
    volumes:
      - .:/src
    restart: always
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      app:
        condition: service_healthy

  scheduler:
    image: orcidhub/app-dev:latest
    command: ["bash", "-c", "sed -i 's/\\r//' ./scheduler.sh && exec ./scheduler.sh"]
    working_dir: /src
    environment:
      - ENV
      - DATABASE_URL
      - MAIL_DEFAULT_SENDER
      - MAIL_SUPPORT_ADDRESS
      - MEMBER_API_FORM_MAIL
      - RQ_REDIS_URL=${RQ_REDIS_URL:-redis://redis:6379/0}
      - ORCID_CLIENT_ID
      - ORCID_CLIENT_SECRET
      - SECRET_KEY
      - SENTRY_DSN
      - SENTRY_TRACES_SAMPLE_RATE
    volumes:
      - .:/src
    restart: always
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      app:
        condition: service_healthy

networks:
  default:
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET:-172.33}.0.0/16

volumes:
  pgdata:
